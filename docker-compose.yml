
services:
  # MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # PostgreSQL for Hive Metastore database
  postgres:
    image: postgres:13-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: password
      POSTGRES_DB: metastore_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Hive Metastore
  metastore:
    image: apache/hive:3.1.3
    container_name: metastore
    depends_on:
      - postgres
      - minio
    environment:
      IS_RESUME: 'true'
      SERVICE_NAME: 'metastore'
      DB_DRIVER: 'postgres'
      SERVICE_OPTS: >
        -Xmx1G
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore_db
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=password
        -Dfs.s3a.access.key=root
        -Dfs.s3a.secret.key=password
        -Dfs.s3a.endpoint=http://minio:9000
        -Dfs.s3a.path.style.access=true
        -Dfs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
        -Dfs.s3a.connection.ssl.enabled=false
      S3_ENDPOINT_URL: 'http://minio:9000'
      AWS_ACCESS_KEY_ID: 'root'
      AWS_SECRET_ACCESS_KEY: 'password'
      DEFAULT_FS: 's3a://sandbox/'
      HIVE_WAREHOUSE_PATH: 's3a://sandbox/warehouse/'
      HADOOP_CLASSPATH: '/opt/hadoop/share/hadoop/tools/lib/*' #cài cái này để hive hiểu được giao thức s3a
    ports:
      - "9083:9083"
    volumes:
      - ./core-site.xml:/opt/hive/conf/core-site.xml

  # Spark Master
  spark-master:
    image: apache/spark:3.4.2
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master
    ports:
      - "8080:8080" #Spark UI 
      - "7077:7077" # Để worker có thể nhận lệnh
    volumes:
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf

  # Spark Worker
  spark-worker:
    image: apache/spark:3.4.2
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
    ports:
      - "8081:8081"
    depends_on:
      - spark-master
    volumes:
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf

  # PostgreSQL for Airflow
  postgres-airflow:
    image: postgres:13
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow_password
      POSTGRES_DB: airflow
    ports:
      - "5434:5432"
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data

  # Airflow Init
  airflow-init:
    image: apache/airflow:3.2.2-python3.12
    container_name: airflow-init
    depends_on:
      - postgres-airflow
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_password@postgres-airflow:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__INTERNAL_API_URL=http://airflow-webserver:8080
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution
      - AIRFLOW__API__SECRET_KEY=this_is_a_very_long_secret_key_for_airflow_api_auth_123456789012345678901234567890
      - AIRFLOW__API_AUTH__JWT_SECRET=this_is_a_very_long_secret_key_for_airflow_api_auth_123456789012345678901234567890
      - AIRFLOW__WEBSERVER__SECRET_KEY=this_is_a_very_long_secret_key_for_airflow_api_auth_123456789012345678901234567890
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    command: version

  # Airflow API Server (formerly Webserver)
  airflow-webserver:
    image: apache/airflow:3.2.2-python3.12
    container_name: airflow-webserver
    restart: always
    user: root
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8082:8080"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_password@postgres-airflow:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__INTERNAL_API_URL=http://airflow-webserver:8080
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution
      - AIRFLOW__API__SECRET_KEY=this_is_a_very_long_secret_key_for_airflow_api_auth_123456789012345678901234567890
      - AIRFLOW__API_AUTH__JWT_SECRET=this_is_a_very_long_secret_key_for_airflow_api_auth_123456789012345678901234567890
      - AIRFLOW__WEBSERVER__SECRET_KEY=this_is_a_very_long_secret_key_for_airflow_api_auth_123456789012345678901234567890
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
      - ./airflow_passwords.json:/opt/airflow/simple_auth_manager_passwords.json.generated
      - ./logs:/opt/airflow/logs
    command: api-server

  # Airflow DAG Processor (Required in Airflow 3)
  airflow-dag-processor:
    image: apache/airflow:3.2.2-python3.12
    container_name: airflow-dag-processor
    restart: always
    user: root
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_password@postgres-airflow:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__INTERNAL_API_URL=http://airflow-webserver:8080
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution
      - AIRFLOW__API__SECRET_KEY=this_is_a_very_long_secret_key_for_airflow_api_auth_123456789012345678901234567890
      - AIRFLOW__API_AUTH__JWT_SECRET=this_is_a_very_long_secret_key_for_airflow_api_auth_123456789012345678901234567890
      - AIRFLOW__WEBSERVER__SECRET_KEY=this_is_a_very_long_secret_key_for_airflow_api_auth_123456789012345678901234567890
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/opt/airflow/logs
    command: dag-processor

  # Airflow Scheduler
  airflow-scheduler:
    image: apache/airflow:3.2.2-python3.12
    container_name: airflow-scheduler
    restart: always
    user: root
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_password@postgres-airflow:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__INTERNAL_API_URL=http://airflow-webserver:8080
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution
      - AIRFLOW__API__SECRET_KEY=this_is_a_very_long_secret_key_for_airflow_api_auth_123456789012345678901234567890
      - AIRFLOW__API_AUTH__JWT_SECRET=this_is_a_very_long_secret_key_for_airflow_api_auth_123456789012345678901234567890
      - AIRFLOW__WEBSERVER__SECRET_KEY=this_is_a_very_long_secret_key_for_airflow_api_auth_123456789012345678901234567890
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/opt/airflow/logs
    command: scheduler

  # Trino Query Engine
  trino:
    image: trinodb/trino:latest
    container_name: trino
    depends_on:
      - metastore
      - minio
    ports:
      - "8083:8080"
    volumes:
      - ./trino/etc:/etc/trino

  # PostgreSQL for Superset Backend
  postgres-superset:
    image: postgres:13-alpine
    container_name: postgres-superset
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset_password
      POSTGRES_DB: superset
    ports:
      - "5435:5432"
    volumes:
      - postgres_superset_data:/var/lib/postgresql/data

  # Superset Init
  superset-init:
    image: apache/superset:latest
    container_name: superset-init
    depends_on:
      - postgres-superset
    command: >
      bash -c "superset db upgrade && 
               superset fab create-admin --username admin --firstname Superset --lastname Admin --email admin@superset.com --password admin && 
               superset init"
    environment:
      - SUPERSET_SECRET_KEY=yoursecretkey1234567890
      - SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://superset:superset_password@postgres-superset:5432/superset
    volumes:
      - superset_home:/app/superset_home

  # Superset Webserver
  superset:
    image: apache/superset:latest
    container_name: superset
    restart: always
    depends_on:
      superset-init:
        condition: service_completed_successfully
      postgres-superset:
        condition: service_started
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=yoursecretkey1234567890
      - SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://superset:superset_password@postgres-superset:5432/superset
    volumes:
      - superset_home:/app/superset_home

volumes:
  minio_data:
  postgres_data:
  postgres_airflow_data:
  postgres_superset_data:
  superset_home:
